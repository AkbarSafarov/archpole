<article class="product-card">
    <a href="#" class="product-card__link" aria-label="@@name"></a>
    <div class="product-card__image">
        <button class="product-card__wish js-wish" type="button" aria-label="В избранное">
            <svg width="20" height="18" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M10.0008 3.77378C11.9583 2.01667 14.9833 2.075 16.8688 3.96447C18.7544 5.85393 18.8191 8.86417 17.0655 10.8275L9.99988 17.9042L2.93444 10.8275C1.18083 8.86417 1.24638 5.84918 3.13109 3.96447C5.01793 2.07763 8.03762 2.01406 10.0008 3.77378Z" stroke="#161616" stroke-width="1.4" fill="none"/>
            </svg>
        </button>
        <img src="@@img" alt="@@name" loading="lazy">
    </div>
    <div class="product-card__body">
        <p class="product-card__name">@@name</p>
        <div class="product-card__line"></div>
        <p class="product-card__price">@@price</p>
    </div>
</article>
