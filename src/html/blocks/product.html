<article class="product-card">
    <a href="#" class="product-card__link" aria-label="@@name"></a>
    <div class="product-card__image">
        <div class="label">
            <div class="label-new">
                <span style="--v-sticker-label: #000;">new</span>
            </div>
        </div>
        <button class="product-card__wish js-wish" type="button" aria-label="В избранное">
            <svg class="norm" width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M7.00057 2.64164C8.37082 1.41167 10.4883 1.4525 11.8082 2.77513C13.1281 4.09775 13.1734 6.20492 11.9458 7.57925L6.99993 12.5329L2.05413 7.57925C0.826601 6.20492 0.872486 4.09442 2.19178 2.77513C3.51257 1.45434 5.62635 1.40984 7.00057 2.64164ZM10.9824 3.59923C10.1079 2.72297 8.69609 2.68742 7.77991 3.50984L7.0011 4.20889L6.22188 3.51039C5.30306 2.68682 3.89377 2.72305 3.01674 3.60008C2.14772 4.4691 2.1041 5.86093 2.90495 6.7802L6.99993 10.8817L11.095 6.7802C11.8962 5.86058 11.8527 4.4714 10.9824 3.59923Z" fill="#161616" />
            </svg>
            <svg class="active" width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M7.0006 2.64164C8.37085 1.41167 10.4884 1.4525 11.8082 2.77513C13.1281 4.09775 13.1734 6.20492 11.9459 7.57925L6.99996 12.5329L2.05416 7.57925C0.826632 6.20492 0.872517 4.09442 2.19181 2.77513C3.5126 1.45434 5.62638 1.40984 7.0006 2.64164Z" fill="#161616" />
            </svg>
        </button>
        <img src="@@img" alt="@@name" loading="lazy">
    </div>
    <div class="product-card__body">
        <div class="product-card__name">@@name</div>
        <div class="product-card__price">@@price</div>
    </div>
</article>
