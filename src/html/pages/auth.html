<!DOCTYPE html>
<html lang="ru">
<head>
    @@include('head.html', {"title": "Авторизация - Archpole", "description": "Вход в аккаунт Archpole"})
</head>

        <img src="img/auth.jpg" alt="Archpole интерьер">

                    <path d="M55.5385 0H40.2727V28H55.5385V24.9565H43.0186V3.04348H55.5385V0Z" fill="#161616" />
                    <path d="M122.344 0H119.598V28H134.864V24.9565H122.344V0Z" fill="#161616" />
                    <path d="M155 0H139.734V28H155V24.9565H142.48V15.8261H155V12.7826H142.48V3.04348H155V0Z" fill="#161616" />
                </svg>
            </a>

                <span class="auth__yandex-text">Войти с</span>

                    <g clip-path="url(#clip0_2422_1008)">
                        <path d="M10.1064 18C14.9701 18 18.9129 13.9706 18.9129 9C18.9129 4.02944 14.9701 0 10.1064 0C5.24277 0 1.29999 4.02944 1.29999 9C1.29999 13.9706 5.24277 18 10.1064 18Z" fill="#FF1B00" />

                    <defs>
                        <clipPath id="clip0_2422_1008">
                            <rect width="39" height="18" fill="white" />
                        </clipPath>
                    </defs>
                </svg>
            </button>

            <!-- Divider -->
            <div class="auth__or my-4"><span>или</span></div>

            <!-- Form -->
            <form class="auth__form js-auth-form" novalidate>

                <!-- Email -->
                <div class="reg-field js-auth-email-field">
                    <input class="reg-field__input" type="email" id="authEmail"
                           placeholder=" " autocomplete="email">
                    <label class="reg-field__label" for="authEmail">Электронная почта</label>
                    <p class="auth__field-error" id="authEmailError" hidden>Такой аккаунт не зарегистрирован</p>
                </div>

                <!-- Password -->
                <div class="reg-field reg-field--pass">
                    <input class="reg-field__input" type="password" id="authPass"
                           placeholder=" " autocomplete="current-password">
                    <label class="reg-field__label" for="authPass">Пароль</label>
                    <button class="reg-field__eye js-auth-eye" type="button"
                            aria-label="Показать/скрыть пароль" hidden>
                        <svg class="js-eye-open" width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true">

                        </svg>
                        <svg class="js-eye-closed" width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true" hidden>
                            <path d="M4.52047 5.93457L1.39366 2.80777L2.80788 1.39355L22.6069 21.1925L21.1927 22.6068L17.8827 19.2968C16.1814 20.3755 14.1638 21.0002 12.0003 21.0002C6.60812 21.0002 2.12215 17.1204 1.18164 12.0002C1.61832 9.62282 2.81932 7.5129 4.52047 5.93457ZM14.7577 16.1718L13.2937 14.7078C12.902 14.8952 12.4634 15.0002 12.0003 15.0002C10.3434 15.0002 9.00026 13.657 9.00026 12.0002C9.00026 11.537 9.10522 11.0984 9.29263 10.7067L7.82866 9.24277C7.30514 10.0332 7.00026 10.9811 7.00026 12.0002C7.00026 14.7616 9.23884 17.0002 12.0003 17.0002C13.0193 17.0002 13.9672 16.6953 14.7577 16.1718ZM7.97446 3.76015C9.22127 3.26959 10.5793 3.00016 12.0003 3.00016C17.3924 3.00016 21.8784 6.87992 22.8189 12.0002C22.5067 13.6998 21.8038 15.2628 20.8068 16.5925L16.947 12.7327C16.9821 12.4936 17.0003 12.249 17.0003 12.0002C17.0003 9.23873 14.7617 7.00016 12.0003 7.00016C11.7514 7.00016 11.5068 7.01833 11.2677 7.05343L7.97446 3.76015Z" fill="#9f9f9f"/>
                        </svg>
                    </button>
                </div>

                <a href="forgot-password.html" class="auth__forgot">Забыли пароль?</a>
                <button class="btn btn-dark auth__submit js-auth-submit" type="submit" disabled>ВОЙТИ</button>
            </form>

            <p class="auth__signup">У вас нет аккаунта?&nbsp; <a href="register.html">Зарегистрироваться</a></p>

        </div>
    </div>

</div>

<script src="libs/bootstrap-5.3.8-dist/js/bootstrap.bundle.min.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
