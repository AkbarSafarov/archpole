<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Восстановление пароля Archpole">
<title>Восстановление пароля - Archpole</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Manrope:wght@200..800&family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remodal/1.1.1/remodal-default-theme.css" integrity="sha512-nF9G9AnUEVv+zx285OqwGE8c1gmkys3qV6iuDK5rVG/UuZLWRgGBy/tN5WzSXXuZDZ1YvwhJ9+a/DTj71L8Lrw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
<link rel="stylesheet" href="libs/swiper-bundle.min.css">
<link rel="stylesheet" href="libs/lightgallery.css">
<link rel="stylesheet" href="css/style.css">

</head>
<body class="auth-body">

<div class="auth">

    <!-- Left photo panel — desktop only -->
    <div class="auth__photo d-none d-lg-block">
        <img src="img/forgot.jpg" alt="Archpole интерьер">
    </div>

    <!-- Right form panel -->
    <div class="auth__panel">
        <div class="auth__card">

            <!-- Back to login -->
            <a href="auth.html" class="auth__back" aria-label="Назад">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M10.8284 12.0007L15.7782 16.9504L14.364 18.3646L8 12.0007L14.364 5.63672L15.7782 7.05093L10.8284 12.0007Z" fill="#161616" />
                </svg>
            </a>

            <h1 class="auth__heading">ВОССТАНОВЛЕНИЕ<br>ПАРОЛЯ</h1>

            <!-- Step 1: email input -->
            <div id="fpStep1">
                <div class="reg-field">
                    <input class="reg-field__input" type="email" id="fpEmail"
                           placeholder=" " autocomplete="email">
                    <label class="reg-field__label" for="fpEmail">Электронная почта</label>
                </div>

                <button class="btn btn-dark auth__submit js-fp-submit" type="button" disabled>
                    ВОССТАНОВИТЬ ПАРОЛЬ
                </button>
            </div>

            <!-- Step 2: sent confirmation (hidden until submit) -->
            <div id="fpStep2" hidden>
                <p class="auth__message">
                    Инструкция по восстановлению пароля отправлена на указанную почту.
                </p>
                <a href="index.html" class="btn btn-dark auth__submit">НА ГЛАВНУЮ</a>
            </div>

        </div>
    </div>

</div>

<script src="libs/bootstrap-5.3.8-dist/js/bootstrap.bundle.min.js"></script>
<script src="js/forgot-password.js"></script>
</body>
</html>
